{% extends "base.html" %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center py-6 px-2 sm:px-3 lg:px-4 mt-2">
    <div class="max-w-md w-full space-y-6 bg-white p-8 rounded-3xl shadow-xl">
        <div>
            <h2 class="mt-2 text-center text-3xl font-extrabold text-slate-900">
                إنشاء حساب جديد
            </h2>
            <p class="mt-2 text-center text-sm text-slate-600">
                أو
                <a href="{{ url_for('login') }}" class="font-medium text-purple-600 hover:text-purple-500 transition">
                    قم بتسجيل الدخول إلى حسابك
                </a>
            </p>
        </div>
        <form class="mt-6 space-y-5" action="{{ url_for('register') }}" method="POST">
            {% if ref_code %}
            <input type="hidden" name="ref_code" value="{{ ref_code }}">
            <div class="bg-blue-50 border border-blue-200 text-blue-700 px-4 py-3 rounded-xl text-sm text-center font-bold">
                أنت تسجل عبر رابط دعوة!
            </div>
            {% endif %}
            
            <div class="rounded-md shadow-sm space-y-4">
                <div>
                    <label for="username" class="sr-only">اسم المستخدم</label>
                    <input id="username" name="username" type="text" required class="appearance-none rounded-xl relative block w-full px-4 py-3 border border-slate-300 placeholder-slate-500 text-slate-900 focus:outline-none focus:ring-purple-500 focus:border-purple-500 focus:z-10 sm:text-sm" placeholder="اسم المستخدم">
                </div>
                <div>
                    <label for="email" class="sr-only">البريد الإلكتروني</label>
                    <input id="email" name="email" type="email" autocomplete="email" required class="appearance-none rounded-xl relative block w-full px-4 py-3 border border-slate-300 placeholder-slate-500 text-slate-900 focus:outline-none focus:ring-purple-500 focus:border-purple-500 focus:z-10 sm:text-sm" placeholder="البريد الإلكتروني">
                </div>
                <div>
                    <label for="password" class="sr-only">كلمة المرور</label>
                    <input id="password" name="password" type="password" autocomplete="new-password" required class="appearance-none rounded-xl relative block w-full px-4 py-3 border border-slate-300 placeholder-slate-500 text-slate-900 focus:outline-none focus:ring-purple-500 focus:border-purple-500 focus:z-10 sm:text-sm" placeholder="كلمة المرور">
                </div>
                <div>
                    <label for="gender" class="sr-only">الجنس</label>
                    <select id="gender" name="gender" required class="appearance-none rounded-xl relative block w-full px-4 py-3 border border-slate-300 placeholder-slate-500 text-slate-900 focus:outline-none focus:ring-purple-500 focus:border-purple-500 focus:z-10 sm:text-sm">
                        <option value="" disabled selected>اختر الجنس</option>
                        <option value="male">ذكر</option>
                        <option value="female">أنثى</option>
                    </select>
                </div>
                <div>
                    <label for="age" class="sr-only">العمر</label>
                    <input id="age" name="age" type="number" required min="10" max="100" class="appearance-none rounded-xl relative block w-full px-4 py-3 border border-slate-300 placeholder-slate-500 text-slate-900 focus:outline-none focus:ring-purple-500 focus:border-purple-500 focus:z-10 sm:text-sm" placeholder="العمر (مثال: 25)">
                </div>
                
                <div class="pt-4 pb-2">
                    <label class="block text-sm font-bold text-slate-700 mb-3 text-center">اختر هدفك من المنصة</label>
                    <div class="space-y-3">
                        <label class="relative flex cursor-pointer rounded-lg border bg-white p-4 shadow-sm focus:outline-none">
                            <input type="radio" name="goal_choice" value="money" class="sr-only peer" checked>
                            <span class="flex flex-1">
                                <span class="flex flex-col">
                                    <span class="block text-sm font-medium text-slate-900">المال (80 دولار)</span>
                                    <span class="mt-1 flex items-center text-sm text-slate-500">100% من المهام + 100 دعوة</span>
                                </span>
                            </span>
                            <span class="pointer-events-none absolute -inset-px rounded-lg border-2 border-transparent peer-checked:border-purple-600" aria-hidden="true"></span>
                            <span class="peer-checked:text-purple-600 text-transparent absolute top-4 left-4">
                                <svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.857-9.809a.75.75 0 00-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 10-1.06 1.061l2.5 2.5a.75.75 0 001.137-.089l4-5.5z" clip-rule="evenodd" />
                                </svg>
                            </span>
                        </label>

                        <label class="relative flex cursor-pointer rounded-lg border bg-white p-4 shadow-sm focus:outline-none">
                            <input type="radio" name="goal_choice" value="followers" class="sr-only peer">
                            <span class="flex flex-1">
                                <span class="flex flex-col">
                                    <span class="block text-sm font-medium text-slate-900">10 آلاف متابع لحسابك</span>
                                    <span class="mt-1 flex items-center text-sm text-slate-500">100% من المهام + 200 دعوة</span>
                                </span>
                            </span>
                            <span class="pointer-events-none absolute -inset-px rounded-lg border-2 border-transparent peer-checked:border-purple-600" aria-hidden="true"></span>
                            <span class="peer-checked:text-purple-600 text-transparent absolute top-4 left-4">
                                <svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.857-9.809a.75.75 0 00-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 10-1.06 1.061l2.5 2.5a.75.75 0 001.137-.089l4-5.5z" clip-rule="evenodd" />
                                </svg>
                            </span>
                        </label>
                    </div>
                </div>
            </div>

            <div>
                <button type="submit" class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-purple-600 hover:bg-purple-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-purple-500 transition shadow-md">
                    إنشاء الحساب
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
